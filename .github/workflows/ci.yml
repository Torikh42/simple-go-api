name: Go CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-lint:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Check Formatting
        run: |
          if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
            echo "Ada file yang belum diformat. Jalankan 'gofmt -w .' atau 'task format' terlebih dahulu!"
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Run Tests
        run: go test -v -race ./...

      - name: Build Binary (Sanity Check)
        run: go build -o bin/api cmd/api/main.go

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test-and-lint # Baru jalan kalau test dan lint hijau
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false # Ubah jadi true jika Anda ingin mem-push ke DockerHub atau GHCR
          tags: simple-go-api:latest
