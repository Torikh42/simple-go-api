name: Go CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-lint:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Check Formatting
        run: |
          UNFORMATTED=$(gofmt -s -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "File berikut belum diformat:"
            echo "$UNFORMATTED"
            echo "Jalankan 'gofmt -w .' atau 'task format' terlebih dahulu!"
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall

      - name: Run Tests
        run: go test -v -race ./...

      - name: Build Binary (Sanity Check)
        run: go build -o bin/api cmd/api/main.go

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test-and-lint
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: simple-go-api:latest
